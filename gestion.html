      function App() {
        // ÉTATS GLOBAUX
        const [players, setPlayers] = useState(PRELOADED_DATA);
        const [activeTab, setActiveTab] = useState('liste');
        const [showAddForm, setShowAddForm] = useState(false);
        const [allowSurclassement, setAllowSurclassement] = useState(false);

        // ÉTATS DE COMPOSITION D'ÉQUIPE
        const [selectedTeam, setSelectedTeam] = useState('U11');
        const [selectedSubTeam, setSelectedSubTeam] = useState('Équipe 1');
        const [teamRosters, setTeamRosters] = useState({
          U11: { 'Équipe 1': [] },
          U13: { 'Équipe 1': [] },
          U14: { 'Équipe 1': [] },
          U18: { 'Équipe 1': [] },
        });

        // ÉTAT DU FORMULAIRE MANUEL
        const [newP, setNewP] = useState({
          nom: '',
          prenom: '',
          dateNaissance: '',
          categorie: 'U11',
          taille: '',
        });
        const [searchQuery, setSearchQuery] = useState('');

        // --- LOGIQUE DE FILTRAGE ET REGROUPEMENT ---
        const filteredPlayers = useMemo(() => {
          return players
            .filter((p) => `${p.nom} ${p.prenom}`.toLowerCase().includes(searchQuery.toLowerCase()))
            .sort((a, b) => a.nom.localeCompare(b.nom));
        }, [players, searchQuery]);

        // Pour l'export PDF par catégorie
        const playersByCategory = useMemo(() => {
          const grouped = {};
          ALL_CATEGORIES.forEach((c) => (grouped[c] = []));
          players.forEach((p) => {
            if (grouped[p.categorie]) {
              grouped[p.categorie].push(p);
            } else {
              grouped[p.categorie] = [p];
            }
          });
          return grouped;
        }, [players]);

        // --- LOGIQUE D'ÉLIGIBILITÉ ET DE ROSTER ---
        const currentCatRosters = teamRosters[selectedTeam] || {};
        const allRosteredInCurrentCat = Object.values(currentCatRosters).flat();

        const eligiblePlayers = useMemo(() => {
          const config = TEAM_CONFIGS[selectedTeam];
          let allowed = [...config.baseCategories];
          if (allowSurclassement) allowed = [...allowed, ...config.surclassementFrom];

          return players
            .filter((p) => allowed.includes(p.categorie))
            .filter((p) => !allRosteredInCurrentCat.includes(p.licence))
            .sort((a, b) => a.nom.localeCompare(b.nom));
        }, [players, selectedTeam, allowSurclassement, allRosteredInCurrentCat]);

        const rosterPlayers = (currentCatRosters[selectedSubTeam] || [])
          .map((lic) => players.find((p) => p.licence === lic))
          .filter(Boolean);

        // --- FONCTIONS ACTIONS ---
        const handleNextSeason = () => {
          if (
            !window.confirm(
              "Attention, cela va augmenter la catégorie de toutes les joueuses d'un an (ex: U11 devient U12). Les compositions d'équipes seront réinitialisées. Continuer ?"
            )
          )
            return;

          setPlayers((prev) =>
            prev.map((p) => {
              if (p.categorie === 'S') return p;
              const match = p.categorie.match(/^U(\d+)$/);
              if (match) {
                const nextAge = parseInt(match[1], 10) + 1;
                return { ...p, categorie: nextAge >= 21 ? 'S' : `U${nextAge}` };
              }
              return p;
            })
          );

          setTeamRosters({
            U11: { 'Équipe 1': [] },
            U13: { 'Équipe 1': [] },
            U14: { 'Équipe 1': [] },
            U18: { 'Équipe 1': [] },
          });
        };

        const handleAddManual = (e) => {
          e.preventDefault();
          const id = 'MAN-' + Date.now();
          setPlayers([
            ...players,
            {
              nom: newP.nom.toUpperCase(),
              prenom: newP.prenom,
              dateNaissance: newP.dateNaissance,
              categorie: newP.categorie,
              licence: id,
              source: 'Ajout Manuel',
              taille: newP.taille ? parseInt(newP.taille) : null,
            },
          ]);
          setShowAddForm(false);
          setNewP({ nom: '', prenom: '', dateNaissance: '', categorie: 'U11', taille: '' });
        };

        const handleImport = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const data = await file.arrayBuffer();
            const wb = XLSX.read(data, { type: 'array', cellDates: true });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            const imported = rows
              .map((r, i) => ({
                nom: (r.Nom || r.nom || '').toUpperCase(),
                prenom: r.Prénom || r.Prenom || r.prenom || '',
                dateNaissance: r['Date Naissance'] || r.dateNaissance || '',
                categorie: r.Catégorie || r.Categorie || r.categorie || 'S',
                licence: r.Licence || r['N°Licence'] || r.licence || 'IMP-' + Date.now() + '-' + i,
                taille: r.Taille || r.taille || null,
                source: 'Import Excel',
              }))
              .filter((p) => p.nom !== '');

            setPlayers((prev) => {
              const existing = new Set(prev.map((p) => p.licence));
              const novelties = imported.filter((p) => !existing.has(p.licence));
              return [...prev, ...novelties];
            });
            alert(`${imported.length} joueuses importées avec succès !`);
          } catch (error) {
            alert('Erreur lors de la lecture du fichier Excel. Vérifiez le format.');
          }
          e.target.value = null;
        };

        const addSubTeam = () => {
          setTeamRosters((prev) => {
            const catTeams = prev[selectedTeam] || {};
            const newIndex = Object.keys(catTeams).length + 1;
            const newName = `Équipe ${newIndex}`;
            return { ...prev, [selectedTeam]: { ...catTeams, [newName]: [] } };
          });
          setSelectedSubTeam(`Équipe ${Object.keys(teamRosters[selectedTeam] || {}).length + 1}`);
        };

        const addToRoster = (lic) => {
          const config = TEAM_CONFIGS[selectedTeam];
          if (rosterPlayers.length >= config.maxRoster) return alert('Effectif maximum atteint !');

          setTeamRosters((prev) => ({
            ...prev,
            [selectedTeam]: {
              ...prev[selectedTeam],
              [selectedSubTeam]: [...(prev[selectedTeam][selectedSubTeam] || []), lic],
            },
          }));
        };

        const removeFromRoster = (lic) => {
          setTeamRosters((prev) => ({
            ...prev,
            [selectedTeam]: {
              ...prev[selectedTeam],
              [selectedSubTeam]: prev[selectedTeam][selectedSubTeam].filter((l) => l !== lic),
            },
          }));
        };

        return (

                  margin: '20px auto 0',

                    paddingBottom: '8px',

                    borderBottom:
                      activeTab === 'liste' ? '2px solid #f59e0b' : '2px solid transparent',

                  📋 Licenciées ({players.length})
                </button>
                <button
                  onClick={() => setActiveTab('equipes')}

                    color: activeTab === 'equipes' ? '#f59e0b' : '#94a3b8',

                    borderBottom:
                      activeTab === 'equipes' ? '2px solid #f59e0b' : '2px solid transparent',
                  }}
                >
                  ⚙️ Composition
                </button>
                <button
                  onClick={() => setActiveTab('overview')}

                    color: activeTab === 'overview' ? '#f59e0b' : '#94a3b8',

            <div style={{ maxWidth: '1200px', margin: '20px auto', padding: '0 20px' }}>

              {activeTab === 'liste' && (

                      />
                      <button className="btn-primary" onClick={() => window.print()}>
                        🖨️ PDF par Catégorie

                    </div>

                    <div

                        overflowX: 'auto',

                    >
                      <table style={{ width: '100%', borderCollapse: 'collapse' }}>

                                </td>

                      catPlayers.sort((a, b) => a.nom.localeCompare(b.nom));

                      return (
                        <div

                                <th style={{ width: '15%' }}>Né(e) le</th>

              {/* === ONGLETS: COMPOSITION === */}

                      {Object.keys(teamRosters[selectedTeam] || {}).map((subTeam) => (
                        <button
                          key={subTeam}
                          onClick={() => setSelectedSubTeam(subTeam)}
                          style={{
                            padding: '8px 16px',
                            borderRadius: '20px',
                            fontSize: '13px',
                            fontWeight: 600,
                            border: 'none',
                            cursor: 'pointer',
                            background:
                              selectedSubTeam === subTeam
                                ? TEAM_CONFIGS[selectedTeam].color
                                : '#1e293b',
                            color: selectedSubTeam === subTeam ? '#fff' : 'var(--text)',
                          }}
                        >
                          {subTeam}
                        </button>
                      ))}
                      <button
                        onClick={addSubTeam}
                        style={{
                          padding: '8px 16px',
                          borderRadius: '20px',
                          fontSize: '13px',
                          fontWeight: 600,
                          border: '1px dashed #64748b',
                          background: 'transparent',
                          color: '#64748b',
                          cursor: 'pointer',
                        }}
                      >
                        + Équipe
                      </button>
                    </div>

                    <label
                      style={{
                        fontSize: '14px',
                        fontWeight: 600,
                        display: 'flex',
                        alignItems: 'center',
                        gap: '8px',
                        cursor: 'pointer',
                      }}
                    >
                      <input
                        type="checkbox"
                        checked={allowSurclassement}
                        onChange={(e) => setAllowSurclassement(e.target.checked)}
                        style={{ width: '16px', height: '16px' }}
                      />
                      Autoriser le surclassement{' '}
                      <span style={{ color: '#64748b', fontWeight: 'normal' }}>
                        (
                        {TEAM_CONFIGS[selectedTeam].surclassementFrom.join(', ') ||
                          'aucun disponible'}
                        )
                      </span>
                    </label>
                  </div>

                  <div
                    style={{
                      display: 'grid',
                      gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                      gap: '20px',
                    }}
                  >
                    <div
                      style={{
                        background: '#111827',
                        borderRadius: '12px',
                        border: '1px solid #1e293b',
                        overflow: 'hidden',
                      }}
                    >
                      <div
                        style={{
                          padding: '15px',
                          borderBottom: '1px solid #1e293b',
                          display: 'flex',
                          justifyContent: 'space-between',
                          alignItems: 'center',
                        }}
                      >
                        <strong style={{ fontSize: '14px' }}>Joueuses Disponibles</strong>
                        <span
                          style={{
                            background: '#1e293b',
                            padding: '2px 8px',
                            borderRadius: '10px',
                            fontSize: '12px',
                            fontWeight: 'bold',
                          }}
                        >
                          {eligiblePlayers.length}
                        </span>
                      </div>
                      <div style={{ maxHeight: '500px', overflowY: 'auto' }}>
                        {eligiblePlayers.length === 0 ? (
                          <div
                            style={{
                              padding: '20px',
                              textAlign: 'center',
                              color: '#64748b',
                              fontSize: '13px',
                            }}
                          >
                            Aucune joueuse disponible pour cette catégorie.
                          </div>
                        ) : (
                          eligiblePlayers.map((p) => (
                            <div
                              key={p.licence}
                              onClick={() => addToRoster(p.licence)}
                              style={{
                                padding: '12px 15px',
                                borderBottom: '1px solid #0f172a',
                                cursor: 'pointer',
                                display: 'flex',
                                justifyContent: 'space-between',
                                alignItems: 'center',
                              }}
                            >
                              <div>
                                <strong style={{ fontSize: '13px' }}>{p.nom}</strong>{' '}
                                <span style={{ fontSize: '13px' }}>{p.prenom}</span>
                                <div
                                  style={{ fontSize: '11px', color: '#64748b', marginTop: '4px' }}
                                >
                                  {p.categorie} {p.taille ? `• ${p.taille}cm` : ''}
                                </div>
                              </div>
                              <span
                                style={{
                                  color: TEAM_CONFIGS[selectedTeam].color,
                                  fontSize: '18px',
                                  fontWeight: 700,
                                  background: `${TEAM_CONFIGS[selectedTeam].color}22`,
                                  width: '24px',
                                  height: '24px',
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  borderRadius: '6px',
                                }}
                              >
                                +
                              </span>
                            </div>
                          ))
                        )}
                      </div>
                    </div>

                    <div
                      style={{
                        background: '#111827',
                        borderRadius: '12px',
                        border: `1px solid ${TEAM_CONFIGS[selectedTeam].color}44`,
                        overflow: 'hidden',
                      }}
                    >
                      <div
                        style={{
                          padding: '15px',
                          borderBottom: '1px solid #1e293b',
                          display: 'flex',
                          justifyContent: 'space-between',
                          alignItems: 'center',
                        }}
                      >
                        <strong style={{ fontSize: '14px' }}>
                          Effectif {selectedTeam} - {selectedSubTeam}
                        </strong>
                        <span
                          style={{
                            background:
                              rosterPlayers.length >= TEAM_CONFIGS[selectedTeam].minRoster
                                ? 'rgba(34,197,94,0.2)'
                                : 'rgba(245,158,11,0.2)',
                            color:
                              rosterPlayers.length >= TEAM_CONFIGS[selectedTeam].minRoster
                                ? '#22c55e'
                                : '#f59e0b',
                            padding: '2px 8px',
                            borderRadius: '10px',
                            fontSize: '12px',
                            fontWeight: 'bold',
                          }}
                        >
                          {rosterPlayers.length} / {TEAM_CONFIGS[selectedTeam].maxRoster}
                        </span>
                      </div>
                      <div style={{ maxHeight: '500px', overflowY: 'auto' }}>
                        {rosterPlayers.length === 0 ? (
                          <div
                            style={{
                              padding: '20px',
                              textAlign: 'center',
                              color: '#64748b',
                              fontSize: '13px',
                            }}
                          >
                            L'équipe est vide. Cliquez sur les joueuses pour les ajouter.
                          </div>
                        ) : (
                          rosterPlayers.map((p, i) => (
                            <div
                              key={p.licence}
                              style={{
                                padding: '12px 15px',
                                borderBottom: '1px solid #0f172a',
                                display: 'flex',
                                justifyContent: 'space-between',
                                alignItems: 'center',
                              }}
                            >
                              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                <span style={{ color: '#64748b', fontSize: '11px', width: '15px' }}>
                                  {i + 1}.
                                </span>
                                <div>
                                  <strong style={{ fontSize: '13px' }}>{p.nom}</strong>{' '}
                                  <span style={{ fontSize: '13px' }}>{p.prenom}</span>
                                  {TEAM_CONFIGS[selectedTeam].surclassementFrom.includes(
                                    p.categorie
                                  ) && (
                                    <span
                                      style={{
                                        marginLeft: '8px',
                                        background: '#f59e0b22',
                                        color: '#f59e0b',
                                        fontSize: '10px',
                                        padding: '2px 6px',
                                        borderRadius: '4px',
                                        fontWeight: 'bold',
                                      }}
                                    >
                                      Surclassée ({p.categorie})
                                    </span>
                                  )}
                                </div>
                              </div>
                              <button
                                onClick={() => removeFromRoster(p.licence)}
                                style={{
                                  background: 'rgba(239,68,68,0.1)',
                                  border: 'none',
                                  color: '#ef4444',
                                  cursor: 'pointer',
                                  width: '24px',
                                  height: '24px',
                                  borderRadius: '6px',
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  fontSize: '16px',
                                }}
                              >
                                ×
                              </button>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* === ONGLETS: RAPPORT / PDF === */}
              {activeTab === 'overview' && (
                <div
                  style={{ background: '#111827', padding: '30px', borderRadius: '15px' }}
                  className="print-card"
                >
                  <div
                    style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      marginBottom: '30px',
                    }}
                  >
                    <h2 style={{ margin: 0 }}>Récapitulatif des compositions</h2>
                    <button className="btn-primary no-print" onClick={() => window.print()}>
                      🖨️ Exporter en PDF
                    </button>
                  </div>

                  {Object.entries(teamRosters).map(([catId, subTeams]) => {
                    const cfg = TEAM_CONFIGS[catId];
                    return Object.entries(subTeams).map(([teamName, licences]) => {
                      if (licences.length === 0) return null;
                      const tPlayers = licences
                        .map((l) => players.find((x) => x.licence === l))
                        .filter(Boolean);

                      return (
                        <div
                          key={`${catId}-${teamName}`}
                          style={{
                            marginBottom: '25px',
                            padding: '20px',
                            borderLeft: `5px solid ${cfg.color}`,
                            background: '#1e293b',
                            borderRadius: '0 10px 10px 0',
                          }}
                          className="print-card"
                        >
                          <div
                            style={{
                              display: 'flex',
                              justifyContent: 'space-between',
                              alignItems: 'center',
                              borderBottom: '1px solid rgba(255,255,255,0.1)',
                              paddingBottom: '10px',
                              marginBottom: '15px',
                            }}
                          >
                            <h3 style={{ margin: 0, color: cfg.color, fontSize: '18px' }}>
                              {catId} - {teamName}
                            </h3>
                            <span style={{ fontSize: '13px', fontWeight: 'bold' }}>
                              {tPlayers.length} joueuses
                            </span>
                          </div>

                          <div
                            style={{
                              display: 'grid',
                              gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
                              gap: '10px',
                              fontSize: '13px',
                            }}
                          >
                            {tPlayers.map((p) => (
                              <div
                                key={p.licence}
                                style={{ display: 'flex', alignItems: 'center', gap: '8px' }}
                              >
                                <span
                                  style={{
                                    width: '6px',
                                    height: '6px',
                                    borderRadius: '50%',
                                    background: cfg.color,
                                    display: 'inline-block',
                                  }}
                                ></span>
                                <strong>{p.nom}</strong> {p.prenom}
                                <span style={{ color: '#94a3b8', fontSize: '11px' }}>
                                  ({p.categorie})
                                </span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    });
                  })}
                </div>
              )}
            </div>

            {/* === MODAL: AJOUT MANUEL === */}
            {showAddForm && (
              <div
                className="no-print"
                style={{
                  position: 'fixed',
                  inset: 0,
                  background: 'rgba(0,0,0,0.8)',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  padding: '20px',
                  zIndex: 100,
                }}
              >
                <form
                  onSubmit={handleAddManual}
                  style={{
                    background: '#111827',
                    padding: '30px',
                    borderRadius: '20px',
                    width: '100%',
                    maxWidth: '500px',
                    border: '1px solid #1e293b',
                    boxShadow: '0 25px 50px -12px rgba(0,0,0,0.5)',
                  }}
                >
                  <h2 style={{ marginTop: 0, marginBottom: '20px' }}>Nouvelle Licenciée</h2>

                  <div style={{ display: 'grid', gap: '15px' }}>
                    <input
                      required
                      placeholder="Nom de famille"
                      value={newP.nom}
                      onChange={(e) => setNewP({ ...newP, nom: e.target.value })}
                      style={{
                        padding: '12px 15px',
                        borderRadius: '8px',
                        background: '#0a0e17',
                        border: '1px solid #1e293b',
                        color: 'white',
                      }}
                    />
                    <input
                      required
                      placeholder="Prénom"
                      value={newP.prenom}
                      onChange={(e) => setNewP({ ...newP, prenom: e.target.value })}
                      style={{
                        padding: '12px 15px',
                        borderRadius: '8px',
                        background: '#0a0e17',
                        border: '1px solid #1e293b',
                        color: 'white',
                      }}
                    />

                    <div style={{ display: 'flex', gap: '15px' }}>
                      <div style={{ flex: 1 }}>
                        <label
                          style={{
                            display: 'block',
                            fontSize: '12px',
                            color: '#64748b',
                            marginBottom: '5px',
                          }}
                        >
                          Date de Naissance (Optionnel)
                        </label>
                        <input
                          type="date"
                          value={newP.dateNaissance}
                          onChange={(e) => setNewP({ ...newP, dateNaissance: e.target.value })}
                          style={{
                            width: '100%',
                            padding: '12px',
                            borderRadius: '8px',
                            background: '#0a0e17',
                            border: '1px solid #1e293b',
                            color: 'white',
                            boxSizing: 'border-box',
                          }}
                        />
                      </div>
                      <div style={{ flex: 1 }}>
                        <label
                          style={{
                            display: 'block',
                            fontSize: '12px',
                            color: '#64748b',
                            marginBottom: '5px',
                          }}
                        >
                          Taille en cm (Optionnel)
                        </label>
                        <input
                          placeholder="ex: 165"
                          type="number"
                          value={newP.taille}
                          onChange={(e) => setNewP({ ...newP, taille: e.target.value })}
                          style={{
                            width: '100%',
                            padding: '12px',
                            borderRadius: '8px',
                            background: '#0a0e17',
                            border: '1px solid #1e293b',
                            color: 'white',
                            boxSizing: 'border-box',
                          }}
                        />
                      </div>
                    </div>

                    <div>
                      <label
                        style={{
                          display: 'block',
                          fontSize: '12px',
                          color: '#64748b',
                          marginBottom: '5px',
                        }}
                      >
                        Catégorie Actuelle *
                      </label>
                      <select
                        required
                        value={newP.categorie}
                        onChange={(e) => setNewP({ ...newP, categorie: e.target.value })}
                        style={{
                          width: '100%',
                          padding: '12px',
                          borderRadius: '8px',
                          background: '#0a0e17',
                          border: '1px solid #1e293b',
                          color: 'white',
                        }}
                      >
                        {ALL_CATEGORIES.map((c) => (
                          <option key={c} value={c}>
                            {c}
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div style={{ display: 'flex', gap: '10px', marginTop: '30px' }}>
                    <button
                      type="button"
                      onClick={() => setShowAddForm(false)}
                      className="btn-secondary"
                      style={{ flex: 1 }}
                    >
                      Annuler
                    </button>
                    <button type="submit" className="btn-primary" style={{ flex: 1 }}>
                      Ajouter la joueuse
                    </button>
                  </div>
                </form>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
